name: 每日市场数据更新

on:
  schedule:
    # 每天 15:05 北京时间 = UTC 07:05
    - cron: '5 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install akshare playwright pandas openpyxl requests

      - run: playwright install chromium --with-deps

      - run: python scripts/fetch_all.py

      - name: 上传数据文件
        run: |
          git config user.name "Market Hot Monitor"
          git config user.email "bot@market-hot-monitor"
          git add data.json market_stats.json
          git diff --staged --quiet || git commit -m "📊 更新市场数据 $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: 上传 Pages 构件
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4