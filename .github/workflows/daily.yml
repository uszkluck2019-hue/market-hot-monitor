name: 每日市场数据更新

on:
  schedule:
    # 每天 15:05 北京时间 = UTC 07:05
    - cron: '5 7 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install akshare playwright
          playwright install chromium --with-deps

      - name: 运行数据抓取
        run: python scripts/fetch_all.py

      - name: 提交更新
        run: |
          git config user.name "Market Hot Monitor"
          git config user.email "bot@market-hot-monitor"
          git add data.json market_stats.json
          git diff --staged --quiet || git commit -m "📊 更新市场数据 $(date '+%Y-%m-%d %H:%M')"
          git push